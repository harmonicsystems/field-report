name: Refresh snapshots

# Weekly snapshot refresh of every external source the report cites.
# Hits CCT WP REST, the village business directory, Wikidata, OSM,
# Wikipedia, and the Library of Congress; rebuilds /kinderhook.json;
# opens a pull request if any data changed.
#
# Cadence is intentionally weekly, not nightly. The village's
# machine-readable surface doesn't change daily, and weekly cadence
# keeps the repo's git diff legible: each PR is a real "what
# changed in the village's structured data this week" report.

on:
  schedule:
    # Monday 05:00 UTC ≈ Sunday 01:00 ET. Catches anything published
    # over the weekend; PR is waiting for the maintainer Monday morning.
    - cron: '0 5 * * 1'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh all snapshots
        # The full pass includes the 594-page CCT business scrape
        # (~10 min, rate-limited to 1 req/sec). Total runtime is
        # comfortably under the 6-hour Actions limit.
        run: node tools/refresh-all.mjs

      - name: Summarise diff
        id: diff
        run: |
          echo "## Snapshot deltas" > /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          if git diff --quiet -- data/ kinderhook.json; then
            echo "_No changes this week — every external source returned identical data._" >> /tmp/pr-body.md
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Files changed:" >> /tmp/pr-body.md
            echo '```' >> /tmp/pr-body.md
            git diff --stat -- data/ kinderhook.json >> /tmp/pr-body.md
            echo '```' >> /tmp/pr-body.md
            echo "" >> /tmp/pr-body.md
            echo "Generated by .github/workflows/refresh-snapshots.yml. Review the diffs and merge if accurate." >> /tmp/pr-body.md
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          cat /tmp/pr-body.md

      - name: Open PR for any deltas
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'snapshots: weekly refresh'
          title: 'snapshots: weekly refresh'
          body-path: /tmp/pr-body.md
          branch: refresh/snapshots
          delete-branch: true
          add-paths: |
            data/snapshots
            kinderhook.json
